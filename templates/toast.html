<!-- Toast Notification -->
<div id="mentor-toast"
    class="fixed bottom-4 left-4 right-4 z-[70] hidden translate-y-6 opacity-0 transition-all duration-500 ease-out md:bottom-6 md:left-auto md:right-6 md:w-full md:max-w-md">
    <div class="rounded-2xl border border-blue-500/30 bg-slate-800/80 p-4 shadow-2xl backdrop-blur md:p-5">
        <div class="flex items-start gap-3">
            <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-blue-500/20 text-blue-300">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5" aria-hidden="true">
                    <path
                        d="M9 18h6M10 22h4M12 2a7 7 0 00-4.95 11.95c.55.55.95 1.22 1.14 1.95L8.4 17h7.2l.21-1.1c.19-.73.59-1.4 1.14-1.95A7 7 0 0012 2z">
                    </path>
                </svg>
            </div>

            <div class="min-w-0 flex-1">
                <div class="flex items-start justify-between gap-3">
                    <p class="text-sm font-semibold text-blue-100">Besoin d'un mentor ?</p>
                    <button id="toast-close" type="button" aria-label="Fermer la notification"
                        class="rounded-md p-1 text-slate-300 transition hover:bg-white/10 hover:text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4" aria-hidden="true">
                            <path d="M18 6L6 18M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>

                <p class="mt-1 text-sm leading-relaxed text-slate-200">
                    Vous voulez vous reconvertir en IT ? Je vous accompagne dans votre transition.
                </p>

                <div class="mt-4 flex items-center gap-4">
                    <a id="toast-discuss" href="#contact"
                        class="inline-flex items-center rounded-lg bg-blue-500 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-300 focus:ring-offset-2 focus:ring-offset-slate-900">
                        Discuter avec Firas
                    </a>
                    <button id="toast-ignore" type="button"
                        class="text-sm font-medium text-slate-300 transition hover:text-white">
                        Ignorer
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
